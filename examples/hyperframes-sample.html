<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hyperframes sample composition</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #020617; }
    #stage { position: relative; overflow: hidden; background: radial-gradient(circle at 35% 30%, #38bdf8, #0f172a 42%, #020617); color: white; font-family: Inter, system-ui, sans-serif; }
    .clip { position: absolute; inset: 0; display: grid; place-items: center; }
    #title { font-size: 92px; font-weight: 900; letter-spacing: -0.06em; text-shadow: 0 18px 60px rgba(0,0,0,.35); }
    #caption { top: auto; bottom: 96px; inset-inline: 0; font-size: 34px; color: #bae6fd; }
  </style>
</head>
<body>
  <div id="stage" data-composition-id="websim-hyperframes-sample" data-start="0" data-width="1920" data-height="1080">
    <h1 id="title" class="clip" data-start="0" data-duration="5" data-track-index="1">HTML → video</h1>
    <p id="caption" class="clip" data-start="1" data-duration="4" data-track-index="2">Pure code-based Hyperframes composition</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.from('#title', { opacity: 0, y: 60, scale: 0.94, duration: 0.8 }, 0);
    tl.from('#caption', { opacity: 0, y: 32, duration: 0.6 }, 1);
    tl.to('#title', { opacity: 0, y: -50, duration: 0.7 }, 4.2);
    tl.to('#caption', { opacity: 0, duration: 0.5 }, 4.4);
    window.__timelines['websim-hyperframes-sample'] = tl;
  </script>
</body>
</html>
